version: 2

builds:
  - main: ./cmd/tdx
    binary: tdx
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "tdx_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: iainmoffat
      name: homebrew-tdx
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/iainmoffat/tdx
    description: CLI and MCP server for managing TeamDynamix time entries
    install: |
      bin.install "tdx"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
